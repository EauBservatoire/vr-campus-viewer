er":"UB","conso2018":1331,"conso2019":1202},"B104":{"code":"B14","nom":"Bâtiment B14","type":"B","etablissement":"UB","dossier":"UB","conso2018":0,"conso2019":1431},"B120":{"code":"C6","nom":"Bâtiment C6","type":"C","etablissement":"UB","dossier":"UB","conso2018":14600,"conso2019":10675}};

const MAX_B=55232,MAX_C=157580,SCALE=0.001;
const EC={'UB':'#4a9eff','UBM':'#a259ff','CROUS':'#f39c12','CNRS':'#2ecc71','INP':'#e74c3c','AUT':'#95a5a6','LABO':'#1abc9c','DOMO FRANCE':'#e67e22','Gironde Habitat':'#d35400'};

function consoColor(v,max){
  if(v<=0) return new THREE.Color(0x555566);
  const t=Math.min(v/max,1),c=new THREE.Color();
  if(t<0.33) c.lerpColors(new THREE.Color(0x00aaff),new THREE.Color(0x00ff88),t/0.33);
  else if(t<0.66) c.lerpColors(new THREE.Color(0x00ff88),new THREE.Color(0xffdd00),(t-0.33)/0.33);
  else c.lerpColors(new THREE.Color(0xffdd00),new THREE.Color(0xff2200),(t-0.66)/0.34);
  return c;
}
function bColor(d,mode){ return mode==='conso'?consoColor(d.conso2019,MAX_B):mode==='etablissement'?new THREE.Color(EC[d.etablissement]||'#555'):new THREE.Color(FC[d.type]||'#555'); }

// SCENE
const scene=new THREE.Scene(); scene.background=new THREE.Color(0x87CEEB); scene.fog=new THREE.Fog(0x87CEEB,3000,8000);
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.01,20000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(devicePixelRatio);
renderer.shadowMap.enabled=true; renderer.xr.enabled=true;
document.body.appendChild(renderer.domElement);
const vrBtnEl=VRButton.createButton(renderer); vrBtnEl.style.display='none'; document.body.appendChild(vrBtnEl);
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.08; controls.maxPolarAngle=Math.PI/2.05;
scene.add(new THREE.HemisphereLight(0x87CEEB,0x4a7c4e,0.8));
const sun=new THREE.DirectionalLight(0xfff5e0,1.8); sun.position.set(500,1000,500); sun.castShadow=true; scene.add(sun);
const fillL=new THREE.DirectionalLight(0xaaccff,0.3); fillL.position.set(-500,200,-500); scene.add(fillL);

// WORLD GROUP (scaled/moved for VR navigation)
const worldGroup=new THREE.Group(); scene.add(worldGroup);
const cameraRig=new THREE.Group(); cameraRig.add(camera); scene.add(cameraRig);

// CONTROLLERS
const ctrlFac=new XRControllerModelFactory();
const rayGeo=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(0,0,-1)]);
let ctrls=[];
function mkCtrl(i){
  const c=renderer.xr.getController(i),g=renderer.xr.getControllerGrip(i);
  g.add(ctrlFac.createControllerModel(g)); cameraRig.add(c); cameraRig.add(g);
  const ray=new THREE.Line(rayGeo,new THREE.LineBasicMaterial({color:0x7ecfff})); ray.scale.z=200; c.add(ray);
  c.addEventListener('selectstart',()=>onTrigger(c));
  ctrls.push(c); return c;
}
const c0=mkCtrl(0),c1=mkCtrl(1);

// TELEPORT RING
const tRing=new THREE.Mesh(new THREE.RingGeometry(0.3,0.4,32),new THREE.MeshBasicMaterial({color:0x7ecfff,side:THREE.DoubleSide}));
tRing.rotation.x=-Math.PI/2; tRing.visible=false; scene.add(tRing);

// GRIP NAVIGATION
let gripSnap={count:0,startDist:0,startScale:1,startPos0:new THREE.Vector3(),startPos1:new THREE.Vector3(),startWPos:new THREE.Vector3()};
function ctrlWPos(c){const p=new THREE.Vector3();c.getWorldPosition(p);return p;}
function updateGrips(){
  const sess=renderer.xr.getSession(); if(!sess) return;
  let gripping=[];
  for(const src of sess.inputSources){
    if(src.gamepad?.buttons[1]?.pressed) gripping.push(src.handedness);
    // A button cycles color mode
    if(src.handedness==='right'&&src.gamepad?.buttons[4]?.pressed&&!src.gamepad._aPrev){
      const modes=['conso','etablissement','fonction'];
      currentMode=modes[(modes.indexOf(currentMode)+1)%3];
      recolor(); buildWrist(); updateDesktopLegend();
      document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',i===['conso','etablissement','fonction'].indexOf(currentMode)));
    }
    if(src.gamepad) src.gamepad._aPrev=src.gamepad?.buttons[4]?.pressed;
  }
  const p0=ctrlWPos(c0),p1=ctrlWPos(c1);
  if(gripping.length===2){
    const dist=p0.distanceTo(p1);
    if(gripSnap.count!==2){gripSnap.count=2;gripSnap.startDist=dist;gripSnap.startScale=worldGroup.scale.x;gripSnap.startPos0.copy(p0);gripSnap.startPos1.copy(p1);gripSnap.startWPos.copy(worldGroup.position);}
    else{const f=dist/gripSnap.startDist,ns=Math.max(0.00005,Math.min(50,gripSnap.startScale*f));worldGroup.scale.setScalar(ns);}
  } else if(gripping.length===1){
    const ac=gripping[0]==='left'?c0:c1,pos=ctrlWPos(ac);
    if(gripSnap.count!==1){gripSnap.count=1;gripSnap.startPos0.copy(pos);}
    else{const d=new THREE.Vector3().subVectors(pos,gripSnap.startPos0).multiplyScalar(worldGroup.scale.x*3);worldGroup.position.add(d);gripSnap.startPos0.copy(pos);}
  } else {gripSnap.count=0;}
}

// TRIGGER
function onTrigger(ctrl){
  const m4=new THREE.Matrix4().identity().extractRotation(ctrl.matrixWorld);
  const ray=new THREE.Raycaster();
  ray.ray.origin.setFromMatrixPosition(ctrl.matrixWorld);
  ray.ray.direction.set(0,0,-1).applyMatrix4(m4);
  const hits=ray.intersectObjects(clickable,false);
  if(hits.length>0){
    const info=meshMap.get(hits[0].object);
    if(info){selMesh(hits[0].object); showVR(info.type==='building'?bPanel(info.id):cPanel(info.id)); return;}
  }
  // Teleport
  const gp=new THREE.Plane(new THREE.Vector3(0,1,0),0),tgt=new THREE.Vector3();
  if(ray.ray.intersectPlane(gp,tgt)){
    const camP=new THREE.Vector3(); camera.getWorldPosition(camP);
    const delta=new THREE.Vector3(tgt.x-camP.x,0,tgt.z-camP.z);
    worldGroup.position.sub(delta);
    tRing.position.copy(tgt); tRing.visible=true; setTimeout(()=>tRing.visible=false,400);
  }
  clearSel(); removeVR();
}

// WRIST MENU
let wristMesh=null, dataMesh=null, currentMode='conso';
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function mkTex(fn,w,h){const cv=document.createElement('canvas');cv.width=w;cv.height=h;fn(cv.getContext('2d'),w,h);return new THREE.CanvasTexture(cv);}

function buildWrist(){
  if(wristMesh) c0.remove(wristMesh);
  const entries=currentMode==='conso'?[]:currentMode==='etablissement'?Object.entries(EC):Object.entries(FC);
  const labels=currentMode==='etablissement'?EL:FL;
  const H=180+entries.length*30;
  const tex=mkTex((ctx,W)=>{
    ctx.fillStyle='rgba(8,8,28,0.96)'; rr(ctx,0,0,W,H,18); ctx.fill();
    ctx.strokeStyle='#7ecfff'; ctx.lineWidth=2; rr(ctx,1,1,W-2,H-2,16); ctx.stroke();
    ctx.fillStyle='#aaa'; ctx.font='bold 18px Arial'; ctx.fillText('MODE',20,35);
    [['conso','💧 Consommation'],['etablissement','🏫 Établissement'],['fonction','🔧 Fonction']].forEach(([m,l],i)=>{
      const y=50+i*42,act=m===currentMode;
      ctx.fillStyle=act?'#7ecfff':'rgba(255,255,255,0.07)'; rr(ctx,8,y,W-16,34,8); ctx.fill();
      ctx.fillStyle=act?'#1a1a2e':'#ccc'; ctx.font=(act?'bold ':'')+'16px Arial'; ctx.fillText(l,18,y+22);
    });
    if(currentMode==='conso'){
      const g=ctx.createLinearGradient(8,0,W-8,0);
      g.addColorStop(0,'#00aaff');g.addColorStop(0.33,'#00ff88');g.addColorStop(0.66,'#ffdd00');g.addColorStop(1,'#ff2200');
      ctx.fillStyle=g; ctx.fillRect(8,180,W-16,14);
      ctx.fillStyle='#aaa'; ctx.font='13px Arial'; ctx.fillText('0',8,210); ctx.fillText('Max',W-30,210);
    } else {
      let y=185;
      entries.forEach(([k,c])=>{
        ctx.fillStyle=c; rr(ctx,8,y,18,18,3); ctx.fill();
        ctx.fillStyle='#ccc'; ctx.font='14px Arial'; ctx.fillText((labels[k]||k).substring(0,24),32,y+13);
        y+=28;
      });
    }
  },400,H);
  wristMesh=new THREE.Mesh(new THREE.PlaneGeometry(0.22,0.22*H/400),new THREE.MeshBasicMaterial({map:tex,transparent:true,side:THREE.DoubleSide,depthTest:false}));
  wristMesh.position.set(0,0.06,-0.02); wristMesh.rotation.x=-0.9;
  c0.add(wristMesh);
}

function showVR(content){
  removeVR();
  const W=512,H=320;
  const tex=mkTex((ctx)=>{
    ctx.fillStyle='rgba(8,8,28,0.97)'; rr(ctx,0,0,W,H,20); ctx.fill();
    ctx.strokeStyle='#7ecfff'; ctx.lineWidth=3; rr(ctx,2,2,W-4,H-4,18); ctx.stroke();
    let y=45;
    content.forEach(({t,a,b,p,c})=>{
      if(t==='title'){ctx.fillStyle='#7ecfff';ctx.font='bold 24px Arial';ctx.fillText((a||'').substring(0,30),18,y);y+=32;}
      else if(t==='sub'){ctx.fillStyle='#555';ctx.font='14px Arial';ctx.fillText((a||'').substring(0,46),18,y);y+=22;ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(18,y);ctx.lineTo(W-18,y);ctx.stroke();y+=10;}
      else if(t==='row'){ctx.fillStyle='#888';ctx.font='14px Arial';ctx.fillText(a||'',18,y);ctx.fillStyle='#fff';ctx.font='bold 14px Arial';ctx.fillText((b||'').substring(0,24),210,y);y+=28;}
      else if(t==='big'){ctx.fillStyle='#7ecfff';ctx.font='bold 34px Arial';ctx.fillText(a||'',18,y);y+=42;}
      else if(t==='bar'){ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(18,y,W-36,10);ctx.fillStyle=c||'#7ecfff';ctx.fillRect(18,y,Math.round((W-36)*(p||0)/100),10);y+=20;}
    });
  },W,H);
  dataMesh=new THREE.Mesh(new THREE.PlaneGeometry(0.5,0.31),new THREE.MeshBasicMaterial({map:tex,transparent:true,side:THREE.DoubleSide,depthTest:false}));
  dataMesh.position.set(0.28,-0.08,-0.65); camera.add(dataMesh);
}
function removeVR(){if(dataMesh){camera.remove(dataMesh);dataMesh=null;}}

function bPanel(bid){
  const d=waterData[bid];
  return [{t:'title',a:d.nom},{t:'sub',a:`${bid} · ${d.code}`},{t:'row',a:'Établissement',b:d.etablissement},{t:'row',a:'Fonction',b:FL[d.type]||d.type},{t:'big',a:`${d.conso2019.toLocaleString('fr-FR')} m³`},{t:'row',a:'2018',b:`${d.conso2018.toLocaleString('fr-FR')} m³`},{t:'bar',p:d.conso2018/MAX_B*100,c:'#4a9eff'},{t:'row',a:'2019',b:`${d.conso2019.toLocaleString('fr-FR')} m³`},{t:'bar',p:d.conso2019/MAX_B*100,c:'#7ecfff'}];
}
function cPanel(zid){
  const d=campusData[zid];
  return [{t:'title',a:d.nom},{t:'sub',a:zid},{t:'row',a:'Surface',b:`${d.surface.toLocaleString('fr-FR')} m²`},{t:'big',a:`${d.conso2019.toLocaleString('fr-FR')} m³`},{t:'bar',p:d.conso2019/MAX_C*100,c:ZC[zid]||'#7ecfff'}];
}

// MESH MAPS
let clickable=[],selMeshRef=null,meshMap=new Map(),matMap=new Map();
const hlMat=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0x7ecfff,emissiveIntensity:0.6,roughness:0.3});
function selMesh(m){clearSel();selMeshRef=m;m.material=hlMat;}
function clearSel(){if(selMeshRef&&matMap.has(selMeshRef)){selMeshRef.material=matMap.get(selMeshRef);selMeshRef=null;}}
function recolor(){clickable.forEach(m=>{const info=meshMap.get(m);if(!info)return;const c=info.type==='building'?bColor(waterData[info.id],currentMode):new THREE.Color(ZC[info.id]||'#888');matMap.get(m).color.copy(c);});}

// LOAD
const loader=new GLTFLoader();
loader.load('campus2026.glb',(gltf)=>{
  const model=gltf.scene; model.scale.setScalar(SCALE); worldGroup.add(model);
  const box=new THREE.Box3().setFromObject(model),ctr=box.getCenter(new THREE.Vector3()),sz=box.getSize(new THREE.Vector3());
  controls.target.copy(ctr); camera.position.set(ctr.x,ctr.y+Math.max(sz.x,sz.z)*0.8,ctr.z+Math.max(sz.x,sz.z)); controls.update();
  model.traverse(node=>{
    if(!node.isMesh) return;
    let anc=node,bid=null,zid=null;
    while(anc){if(waterData[anc.name]){bid=anc.name;break;}if(campusData[anc.name]){zid=anc.name;break;}anc=anc.parent;}
    if(bid){const mat=new THREE.MeshStandardMaterial({color:bColor(waterData[bid],currentMode),roughness:0.55,metalness:0.05});node.material=mat;node.castShadow=true;node.receiveShadow=true;clickable.push(node);meshMap.set(node,{type:'building',id:bid});matMap.set(node,mat);}
    else if(zid){const mat=new THREE.MeshStandardMaterial({color:new THREE.Color(ZC[zid]||'#888'),roughness:0.8,transparent:true,opacity:0.5});node.material=mat;clickable.push(node);meshMap.set(node,{type:'campus',id:zid});matMap.set(node,mat);}
    else{node.material=new THREE.MeshStandardMaterial({color:0x2a2a3e,roughness:0.95});}
  });
  updateDesktopLegend(); buildWrist();
  const btn=document.getElementById('vr-btn');
  btn.disabled=false; btn.textContent='🥽 Entrer en VR'; btn.onclick=()=>vrBtnEl.click();
  renderer.xr.addEventListener('sessionstart',()=>{controls.enabled=false;buildWrist();});
  renderer.xr.addEventListener('sessionend',()=>controls.enabled=true);
  document.getElementById('loading').style.display='none';
},undefined,()=>{document.getElementById('loading').innerHTML='<h2 style="color:#c0392b">Erreur</h2>';});

// DESKTOP CLICK
const rc=new THREE.Raycaster(),mv=new THREE.Vector2();let md={x:0,y:0};
renderer.domElement.addEventListener('mousedown',e=>{md={x:e.clientX,y:e.clientY};});
renderer.domElement.addEventListener('mouseup',e=>{
  if(Math.abs(e.clientX-md.x)>5||Math.abs(e.clientY-md.y)>5)return;
  mv.x=(e.clientX/innerWidth)*2-1; mv.y=-(e.clientY/innerHeight)*2+1;
  rc.setFromCamera(mv,camera);
  const hits=rc.intersectObjects(clickable,false);
  if(hits.length>0){const info=meshMap.get(hits[0].object);if(info){selMesh(hits[0].object);if(info.type==='building')showDBP(info.id);else showDCP(info.id);}}
  else{closeDesktopPopup();clearSel();}
});

function showDBP(bid){
  const d=waterData[bid];
  document.getElementById('dp-building').style.display='block';document.getElementById('dp-campus').style.display='none';
  document.getElementById('dp-nom').textContent=d.nom;document.getElementById('dp-id').textContent=bid+' · '+d.code;
  document.getElementById('dp-etab').textContent=d.etablissement;
  document.getElementById('dp-type').textContent=FL[d.type]||d.type;document.getElementById('dp-type').style.background=FC[d.type]||'#555';
  document.getElementById('dp-dossier').textContent=d.dossier.replace(/_/g,' ');
  document.getElementById('dp-conso').textContent=d.conso2019.toLocaleString('fr-FR');
  document.getElementById('dp-v2018').textContent=d.conso2018.toLocaleString('fr-FR')+' m³';document.getElementById('dp-v2019').textContent=d.conso2019.toLocaleString('fr-FR')+' m³';
  document.getElementById('dp-b2018').style.width=(d.conso2018/MAX_B*100)+'%';document.getElementById('dp-b2019').style.width=(d.conso2019/MAX_B*100)+'%';
  document.getElementById('desktop-popup').style.display='block';
}
function showDCP(zid){
  const d=campusData[zid];
  document.getElementById('dp-building').style.display='none';document.getElementById('dp-campus').style.display='block';
  document.getElementById('dc-nom').textContent=d.nom;document.getElementById('dc-id').textContent=zid;
  document.getElementById('dc-surface').textContent=d.surface.toLocaleString('fr-FR')+' m²';
  document.getElementById('dc-conso').textContent=d.conso2019.toLocaleString('fr-FR');
  document.getElementById('dc-val').textContent=d.conso2019.toLocaleString('fr-FR')+' m³';
  document.getElementById('dc-bar').style.width=(d.conso2019/MAX_C*100)+'%';document.getElementById('dc-bar').style.background=ZC[zid]||'#7ecfff';
  document.getElementById('desktop-popup').style.display='block';
}
window.closeDesktopPopup=()=>{clearSel();document.getElementById('desktop-popup').style.display='none';};

window.setMode=function(mode,btn){
  currentMode=mode;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  recolor();updateDesktopLegend();buildWrist();closeDesktopPopup();
};

let activeFilter=null;
function updateDesktopLegend(){
  activeFilter=null;const el=document.getElementById('desktop-legend');
  if(currentMode==='conso'){el.innerHTML='<h3>Consommation 2019 (m³)</h3><div class="legend-bar"></div><div class="legend-labels"><span>0</span><span>Faible</span><span>Élevée</span></div><div class="legend-item"><div class="legend-dot" style="background:#555566;"></div><span>Pas de données</span></div>';}
  else{const entries=currentMode==='etablissement'?Object.entries(EC):Object.entries(FC),labels=currentMode==='etablissement'?EL:FL;
    el.innerHTML=`<h3>${currentMode==='etablissement'?'Établissement':'Fonction'} <span style="color:#555;font-size:10px;">— cliquez pour filtrer</span></h3>`+entries.map(([k,c])=>`<div class="legend-item clickable" data-key="${k}" onclick="filterBy('${k}')"><div class="legend-dot" style="background:${c};"></div><span>${labels[k]||k}</span></div>`).join('');}
}
window.filterBy=function(key){
  if(activeFilter===key){activeFilter=null;recolor();document.querySelectorAll('.legend-item.clickable').forEach(e=>e.classList.remove('active','dimmed'));}
  else{activeFilter=key;clickable.forEach(m=>{const info=meshMap.get(m);if(!info||info.type!=='building')return;const d=waterData[info.id];const match=currentMode==='etablissement'?d.etablissement===key:d.type===key;matMap.get(m).color.copy(match?bColor(d,currentMode):new THREE.Color(0x222233));});document.querySelectorAll('.legend-item.clickable').forEach(e=>{e.classList.toggle('active',e.dataset.key===key);e.classList.toggle('dimmed',e.dataset.key!==key);});}
};

window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
renderer.setAnimationLoop(()=>{if(!renderer.xr.isPresenting)controls.update();else updateGrips();renderer.render(scene,camera);});
</script>
</body>
